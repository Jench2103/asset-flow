site_name: AssetFlow
site_description: A macOS app for snapshot-based portfolio management and asset allocation tracking.
site_url: https://Jench2103.github.io/asset-flow/
repo_url: https://github.com/Jench2103/asset-flow
repo_name: Jench2103/AssetFlow
docs_dir: mkdocs/
exclude_docs: |
  CLAUDE.md
  AGENTS.md
  README.md

theme:
  name: material
  custom_dir: overrides/
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  favicon: assets/images/favicon.png
  logo: assets/images/favicon.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search:
      lang:
        - en
        - zh
  - mike:
      alias_type: symlink
      canonical_version: latest
  - include-markdown
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh-TW
          name: 中文（台灣）
          build: true
          nav_translations:
            Home: 首頁
            User Guide: 使用指南
            Getting Started: 開始使用
            Quick Start: 快速入門
            Guide: 功能說明
            Dashboard: 儀表板
            Performance Metrics: 績效指標
            Snapshots: 快照
            Bulk Entry: 批次輸入
            Assets: 資產
            Categories: 類別
            Platforms: 平台
            Cash Flows: 現金流
            Rebalancing: 再平衡
            Import CSV: 匯入 CSV
            Settings: 設定
            Preferences: 偏好設定
            Security: 安全性
            Backup & Restore: 備份與還原
            Reference: 參考
            CSV Format: CSV 格式
            Currencies & Exchange Rates: 幣別與匯率
            Keyboard Shortcuts: 鍵盤快速鍵
            FAQ: 常見問題
            Troubleshooting: 疑難排解
            Changelog: 版本紀錄
  - git-revision-date-localized:
      enable_creation_date: true
      type: date

nav:
  - Home: index.md
  - User Guide:
      - user-guide/index.md
      - Getting Started:
          - user-guide/getting-started/index.md
          - Quick Start: user-guide/getting-started/quick-start.md
      - Guide:
          - Dashboard: user-guide/guide/dashboard.md
          - Performance Metrics: user-guide/guide/performance-metrics.md
          - Snapshots: user-guide/guide/snapshots.md
          - Bulk Entry: user-guide/guide/bulk-entry.md
          - Assets: user-guide/guide/assets.md
          - Categories: user-guide/guide/categories.md
          - Platforms: user-guide/guide/platforms.md
          - Cash Flows: user-guide/guide/cash-flows.md
          - Rebalancing: user-guide/guide/rebalancing.md
          - Import CSV: user-guide/guide/import-csv.md
      - Settings:
          - Preferences: user-guide/settings/preferences.md
          - Security: user-guide/settings/security.md
          - Backup & Restore: user-guide/settings/backup-restore.md
      - Reference:
          - CSV Format: user-guide/reference/csv-format.md
          - Currencies & Exchange Rates: user-guide/reference/currencies.md
          - Keyboard Shortcuts: user-guide/reference/keyboard-shortcuts.md
      - FAQ: user-guide/faq.md
      - Troubleshooting: user-guide/troubleshooting.md
      - Changelog: user-guide/changelog.md

copyright: Copyright &copy; 2025-2026 Jen-Chien Chang

extra:
  version:
    provider: mike
    default: latest
    alias: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
          percent_encode: true
