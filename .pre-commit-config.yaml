# Pre-commit configuration for AssetFlow
# See https://pre-commit.com for more information

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-yaml
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: pretty-format-json
        args: ["--autofix", "--indent=2", "--no-sort-keys"]
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.22
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
          - mdformat-tables
  - repo: local
    hooks:
      - id: swift-format
        name: swift-format
        entry: swift-format format --in-place --recursive --parallel
        language: system
        types: [swift]
        require_serial: true
      - id: swift-format-lint
        name: swift-format-lint
        entry: swift-format lint --strict --recursive --parallel
        language: system
        types: [swift]
        require_serial: true
      - id: swiftlint
        name: swiftlint
        entry: swiftlint --fix --quiet
        language: system
        types: [swift]
        require_serial: true
  - repo: https://github.com/mrtazz/checkmake.git
    rev: v0.3.2
    hooks:
      - id: checkmake
  - repo: https://github.com/psf/black
    rev: 25.1.0  # Use the latest version or pin to match your project
    hooks:
      - id: black
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        name: isort (python)
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.400
    hooks:
    - id: pyright
