# Pre-commit configuration for AssetFlow
# See https://pre-commit.com for more information

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-yaml
        exclude: ^mkdocs\.yml$
      - id: check-yaml
        args: ["--unsafe"]
        files: ^mkdocs\.yml$
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: pretty-format-json
        args: ["--autofix", "--indent=2", "--no-sort-keys"]
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.22
    hooks:
      - id: mdformat
        name: mdformat (project)
        additional_dependencies:
          - mdformat-gfm
          - mdformat-frontmatter
        exclude: ^(mkdocs/)
      - id: mdformat
        name: mdformat (mkdocs)
        additional_dependencies:
          - mdformat-mkdocs
          - mdformat-front-matters
          - mdformat-simple-breaks
        files: ^(mkdocs/)
  - repo: local
    hooks:
      - id: swift-format
        name: swift-format
        entry: swift-format format --in-place --recursive --parallel
        language: system
        types: [swift]
        require_serial: true
      - id: swift-format-lint
        name: swift-format-lint
        entry: swift-format lint --strict --recursive --parallel
        language: system
        types: [swift]
        require_serial: true
      - id: swiftlint
        name: swiftlint
        entry: swiftlint --fix --quiet
        language: system
        types: [swift]
        require_serial: true
  - repo: https://github.com/mrtazz/checkmake.git
    rev: v0.3.2
    hooks:
      - id: checkmake
  - repo: https://github.com/psf/black
    rev: 25.1.0 # Use the latest version or pin to match your project
    hooks:
      - id: black
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        name: isort (python)
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.400
    hooks:
      - id: pyright
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.10
    hooks:
      - id: uv-lock
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args: ["-w", "--ignore-words-list", "zar"]
        files: ^(mkdocs/)
        exclude: \.(png)$
